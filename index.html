<!DOCTYPE html>
<html>
<head>
      <link href="https://www.texmacs.org/css/tmdoc.css" type="text/css" rel="stylesheet"></link>
  
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Microeconomic Theory Workshop</title>

<style>

body{
font-family: "Source Serif 7", serif;
font-size:20px;
line-height:1.7;
max-width:900px;
margin:auto;
padding:40px 20px;
background:#fafafa;
color:#222;
}

h1{
font-size:2.6em;
margin-bottom:0.2em;
}

.subtitle{
color:#555;
margin-bottom:1em;
}

.note{
margin-bottom:2em;
}

.semester{
margin-top:50px;
font-size:1.6em;
border-bottom:2px solid #444;
padding-bottom:4px;
}

.item{
border-bottom:1px solid #ddd;
}

.header{
display:flex;
align-items:center;
cursor:pointer;
padding:16px 0;
}

.header:hover{
background:#f3f3f3;
}

.date{
width:130px;
font-weight:600;
}

.speaker{
flex-grow:1;
}

.empty{
color:#aaa;
}

.arrow{
margin-left:10px;
transition:transform .2s;
}

.content{
display:none;
padding:10px 0 20px 130px;
font-size:0.95em;
}

.item.active .content{
display:block;
}

.item.active .arrow{
transform:rotate(90deg);
}

.item.upcoming{
border-left:4px solid #2c6db2;
padding-left:8px;
background:#f6f9ff;
}

.links{
margin-top:12px;
font-size:0.9em;
}

.links a{
color:#1a5fb4;
text-decoration:none;
}

.links a:hover{
text-decoration:underline;
}

@media (max-width:700px){

body{font-size:18px}

.header{
flex-direction:column;
align-items:flex-start;
}

.date{width:auto}

.content{padding-left:0}

}

</style>

</head>

<body>

<h2>Microeconomic Theory Workshop
      School of Economics, University of Sydney
</h2>

<h3 class="note">
Seminars typically begin at <b>4 PM on Tuesdays</b> in the Social Sciences Building.
</h3>

<div id="seminars"></div>

<script>

function formatDate(d){

const date=new Date(d)

return date.toLocaleDateString(
'en-GB',
{day:'numeric',month:'long'}
)

}

function semesterKey(d){

const date=new Date(d)

const year=date.getFullYear()

const semester=(date.getMonth()<6)?"S1":"S2"

return semester+" "+year

}

function calendarLink(title,speaker,date,location){

const start=new Date(date)

start.setHours(16,0,0)

const end=new Date(start)

end.setHours(17)

function format(d){

return d.toISOString().replace(/[-:]/g,"").slice(0,15)

}

const params=new URLSearchParams({

action:"TEMPLATE",
text:title?title:"Seminar: "+speaker,
dates:format(start)+"/"+format(end),
location:location||""

})

return "https://calendar.google.com/calendar/render?"+params

}

fetch("seminars.csv")

.then(r=>r.text())

.then(text=>{

const rows=text.trim().split("\n")

const headers=rows.shift().split(",")

const seminars=rows.map(r=>{

const values=r.split(",")

let obj={}

headers.forEach((h,i)=>obj[h]=values[i]||"")

return obj

})

seminars.sort((a,b)=>new Date(a.date)-new Date(b.date))

const container=document.getElementById("seminars")

let groups={}

seminars.forEach(s=>{

const key=semesterKey(s.date)

if(!groups[key])groups[key]=[]

groups[key].push(s)

})

Object.keys(groups).sort().forEach(semester=>{

let sem=document.createElement("div")

sem.className="semester"

sem.textContent=semester

container.appendChild(sem)

groups[semester].forEach(s=>{

let item=document.createElement("div")

item.className="item"

item.dataset.date=s.date

let speaker=s.speaker
? s.speaker+(s.affiliation?` (${s.affiliation})`:"")
: "TBA"

let links=[]

if(s.paper)links.push(`<a href="${s.paper}">paper</a>`)

if(s.slides)links.push(`<a href="${s.slides}">slides</a>`)

links.push(`<a href="${calendarLink(s.title,s.speaker,s.date,s.location)}">add to calendar</a>`)

item.innerHTML=`

<div class="header">

<div class="date">${formatDate(s.date)}</div>

<div class="speaker ${s.speaker?"":"empty"}">${speaker}</div>

<div class="arrow">▶</div>

</div>

<div class="content">

${s.title?`<b>${s.title}</b><br><br>`:""}

${s.abstract||"Abstract to be announced."}

<div class="links">${links.join(" | ")}</div>

</div>

`

container.appendChild(item)

})

})

const items=document.querySelectorAll(".item")

items.forEach(item=>{

item.querySelector(".header").onclick=()=>{

items.forEach(i=>i.classList.remove("active"))

item.classList.add("active")

}

})

const today=new Date()

today.setHours(0,0,0,0)

let next=null

items.forEach(item=>{

const d=new Date(item.dataset.date)

if(d>=today && !next)next=item

})

if(next){

next.classList.add("active")

next.classList.add("upcoming")

}

})

</script>

</body>
</html>
